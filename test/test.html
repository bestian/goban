<html ng-app = "testApp">

<head>
  <meta charset = "utf-8"/>
  <title>webConfig</title>  
</head>

<body ng-controller = "ctrl">

<select ng-model="goban.title" ng-options="o.t as o.n group by o.c for o in goban.related" ng-change="goban.load()"></select>


<i ng-repeat = "r in goban.icons">  
<img ng-src="{{r.u}}" height = "50"
    alt="{{r.n}}" title="{{r.n}}" />
</i>

<a ng-href = "{{goban.path}}{{goban.title}}Config">{{goban.title}}Config</a>

<button ng-click = "goban.backupAll()">backup</button>

<hr/>

{{goban.data}}

<hr/>

<ul>
  <li ng-repeat = "d in goban.data">
    {{d}}
  </li>
</ul>

<hr>

{{goban.related}}


<script type="text/javascript" src = "../bower_components/angular/angular.min.js"></script>  

<script type="text/javascript" src = "../goban.js"></script>  

<script type="text/javascript" src = "./test.js"></script>


</body>
</html>
